name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    name: Build and static checks
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Check whitespace
        run: |
          python - <<'PY'
          import subprocess
          import sys
          from pathlib import Path

          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          failures = []
          for name in files:
              path = Path(name)
              try:
                  text = path.read_text()
              except UnicodeDecodeError:
                  continue
              for line_number, line in enumerate(text.splitlines(), start=1):
                  if line.rstrip(" \t") != line:
                      failures.append(f"{name}:{line_number}: trailing whitespace")
              if text and not text.endswith("\n"):
                  failures.append(f"{name}: missing final newline")

          if failures:
              print("\n".join(failures))
              sys.exit(1)
          PY

      - name: Install Python package
        run: python -m pip install -e .

      - name: Compile Python sources
        run: python -m compileall axtree_api examples scripts

      - name: Build Swift daemon
        run: swift build

      - name: Import public Python API
        run: |
          python - <<'PY'
          from axtree_api import ActionAPI, DaemonManager, ElementNode, UIState
          from axtree_api import capture_element_screenshot, get_semantic_label_from_vision

          assert ActionAPI
          assert DaemonManager
          assert ElementNode
          assert UIState
          assert capture_element_screenshot
          assert get_semantic_label_from_vision
          PY
