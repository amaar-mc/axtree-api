name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    name: Build and static checks
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check whitespace
        run: git diff --check

      - name: Install Python package
        run: python -m pip install -e .

      - name: Compile Python sources
        run: python -m compileall axtree_api examples scripts

      - name: Build Swift daemon
        run: swift build

      - name: Import public Python API
        run: |
          python - <<'PY'
          from axtree_api import ActionAPI, DaemonManager, ElementNode, UIState
          from axtree_api import capture_element_screenshot, get_semantic_label_from_vision

          assert ActionAPI
          assert DaemonManager
          assert ElementNode
          assert UIState
          assert capture_element_screenshot
          assert get_semantic_label_from_vision
          PY
